<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <!-- Фон -->
    <rect width="100" height="100" fill="black"/>
    
    <!-- Уши -->
    <polygon points="25,30 35,15 45,30" fill="white"/>
    <polygon points="55,30 65,15 75,30" fill="white"/>
    
    <!-- Голова -->
    <circle cx="50" cy="50" r="30" fill="white"/>
    
    <!-- Глаза -->
    <circle cx="38" cy="45" r="6" fill="black"/>
    <circle cx="62" cy="45" r="6" fill="black"/>
    <circle cx="40" cy="44" r="2" fill="white"/>
    <circle cx="64" cy="44" r="2" fill="white"/>
    
    <!-- Нос -->
    <polygon points="50,52 47,58 53,58" fill="black"/>
    
    <!-- Рот -->
    <line x1="47" y1="58" x2="44" y2="63" stroke="black" stroke-width="2"/>
    <line x1="53" y1="58" x2="56" y2="63" stroke="black" stroke-width="2"/>
    
    <!-- Усы -->
    <line x1="25" y1="52" x2="38" y2="54" stroke="black" stroke-width="1.5"/>
    <line x1="25" y1="58" x2="38" y2="58" stroke="black" stroke-width="1.5"/>
    <line x1="25" y1="64" x2="38" y2="62" stroke="black" stroke-width="1.5"/>
    
    <line x1="75" y1="52" x2="62" y2="54" stroke="black" stroke-width="1.5"/>
    <line x1="75" y1="58" x2="62" y2="58" stroke="black" stroke-width="1.5"/>
    <line x1="75" y1="64" x2="62" y2="62" stroke="black" stroke-width="1.5"/>
    
    <!-- Тело (плечи) -->
    <rect x="35" y="75" width="30" height="20" fill="white"/>
    
    <!-- Лапки -->
    <ellipse cx="40" cy="90" rx="8" ry="5" fill="white" stroke="black" stroke-width="1"/>
    <ellipse cx="60" cy="90" rx="8" ry="5" fill="white" stroke="black" stroke-width="1"/>
    
    <!-- Хвост -->
    <path d="M75 80 Q90 80 88 65 Q86 55 80 58" fill="none" stroke="white" stroke-width="4"/>
</svg>